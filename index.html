function buildGameMedia(appId, liveData) {
  // liveData (tùy chọn): JSON từ /api/steammedia (serverless) — ưu tiên hơn hardcode.
  // Không có liveData → fallback STEAM_MEDIA hardcode (ổn định, luôn hiện).

  // CASE 1: liveData.items[] = thứ tự Y CHANG Steam 1:1 (video/ảnh lẫn nhau theo admin set).
  // Render đúng thứ tự nhận được, KHÔNG tự sắp xếp lại.
  if (liveData && Array.isArray(liveData.items) && liveData.items.length > 0) {
    const media = liveData.items.map((it, i) => {
      if (it.type === 'movie') {
        return { type: 'video', src: it.src || '', key: `v${i}`, thumbSrc: it.thumb || '' };
      }
      // screenshot
      return { type: 'image', src: it.src || '', key: `ss${i}` };
    }).filter(m => m.src);
    if (media.length > 0) return media;
  }

  // CASE 2: hardcode STEAM_MEDIA (hoặc liveData old shape) — logic cũ.
  const data = liveData || STEAM_MEDIA[String(appId)];
  const media = [];
  if (data) {
    const movies = data.movies || [];
    const screenshots = data.screenshots || [];
    
    // Tối đa 2 video đầu tiên xếp bên trái
    const firstTwoMovies = movies.slice(0, 2);
    firstTwoMovies.forEach((m, i) => {
      media.push({
        type: "video",
        src: m.src,
        key: `v${i}`,
        thumbSrc: m.thumb
      });
    });
    
    // Toàn bộ ảnh chụp màn hình ở giữa
    screenshots.forEach((url, i) => {
      // screenshots có thể là string (hardcode) hoặc object {path_full} (live) — chuẩn hóa
      const full = typeof url === 'string' ? url : (url && url.path_full) || '';
      if (full) {
        media.push({
          type: "image",
          src: full,
          key: `ss${i}`
        });
      }
    });
    
    // Các video còn lại (từ video thứ 3 trở đi) ở bên phải
    const remainingMovies = movies.slice(2);
    remainingMovies.forEach((m, i) => {
      media.push({
        type: "video",
        src: m.src,
        key: `v${i + 2}`,
        thumbSrc: m.thumb
      });
    });
  }
  
  if (media.length === 0) {
    media.push({ type: "image", src: `${STEAM_CDN}/${appId}/header.jpg`, key: "header" });
  }
  return media;
}

// Gan media cho tat ca game trong GAME_DATA
GAME_DATA.forEach(g => {
  if (!g.media) {
    g.media = buildGameMedia(g.appId);
  }
});

const UserProfileContent = ({ currentUser, userData }) => {
  const [showPasswordInput, setShowPasswordInput] = React.useState(false);
  const [currentPassword, setCurrentPassword] = React.useState('');
  const [newPassword, setNewPassword] = React.useState('');
  
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState('');
  const [success, setSuccess] = React.useState('');
  
  const fileInputRef = React.useRef(null);

  const handleFileChange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setError('');
    setSuccess('');
    setLoading(true);

    const reader = new FileReader();
    reader.onload = (event) => {
      const img = new Image();
      img.onload = async () => {
        try {
          // Tạo canvas để nén ảnh thành hình vuông 150x150
          const canvas = document.createElement('canvas');
          const maxDim = 150;
          canvas.width = maxDim;
          canvas.height = maxDim;
          const ctx = canvas.getContext('2d');
          
          const minDim = Math.min(img.width, img.height);
          const sx = (img.width - minDim) / 2;
          const sy = (img.height - minDim) / 2;
          
          ctx.drawImage(img, sx, sy, minDim, minDim, 0, 0, maxDim, maxDim);
          
          // Trích xuất chuỗi Base64 JPEG chất lượng 0.75
          const base64Data = canvas.toDataURL('image/jpeg', 0.75);
          
          // Cập nhật Firestore
          await db.collection("users").doc(currentUser.uid).update({
            avatar: base64Data
          });
          
          setSuccess("Thay đổi ảnh đại diện thành công!");
        } catch (err) {
          console.error("Lỗi xử lý ảnh:", err);
          setError("Lỗi xử lý ảnh. Vui lòng thử lại với ảnh khác.");
        } finally {
          setLoading(false);
        }
      };
      img.onerror = () => {
        setError("Định dạng file ảnh không hợp lệ.");
        setLoading(false);
      };
      img.src = event.target.result;
    };
    reader.onerror = () => {
      setError("Không thể đọc file ảnh.");
      setLoading(false);
    };
    reader.readAsDataURL(file);
  };

  const handleUpdatePassword = async (e) => {
    e.preventDefault();
    setError('');
    setSuccess('');
    setLoading(true);
    try {
      if (newPassword.trim().length < 6) {
        throw new Error("Mật khẩu mới phải dài từ 6 ký tự trở lên.");
      }
      
      // 1. Tạo thông tin xác thực từ email và mật khẩu hiện tại
      const email = currentUser.email;
      const credential = firebase.auth.EmailAuthProvider.credential(email, currentPassword.trim());
      
      // 2. Xác thực lại tài khoản
      await currentUser.reauthenticateWithCredential(credential);
      
      // 3. Đổi mật khẩu mới
      await currentUser.updatePassword(newPassword.trim());
      
      setSuccess("Cập nhật mật khẩu thành công!");
      setShowPasswordInput(false);
      setNewPassword('');
      setCurrentPassword('');
    } catch (err) {
      console.error(err);
      if (err.code === 'auth/wrong-password') {
        setError("Mật khẩu hiện tại không chính xác.");
      } else if (err.code === 'auth/invalid-credential') {
        setError("Thông tin xác thực không đúng. Vui lòng thử lại.");
      } else {
        setError(err.message || "Đã xảy ra lỗi khi đổi mật khẩu.");
      }
    } finally {
      setLoading(false);
    }
  };

  const username = userData && userData.displayName ? userData.displayName : (currentUser && currentUser.displayName ? currentUser.displayName : "Khách");
  const avatarUrl = userData && userData.avatar ? userData.avatar : (currentUser && currentUser.photoURL ? currentUser.photoURL : "https://ui-avatars.com/api/?name=Guest&background=333&color=fff");
  const roleText = username === 'Nexus' ? 'CHỦ SỞ HỮU' : (userData?.role || 'THÀNH VIÊN');
  const userEmail = currentUser?.email || '';
  const lastLogin = currentUser?.metadata?.lastSignInTime ? new Date(currentUser.metadata.lastSignInTime).toLocaleString('vi-VN') : '00:00:00 - 01/01/70';

  return (
    <div className="profile-content-container">
      {error && <div className="up-error-banner">{error}</div>}
      {success && <div className="up-success-banner">{success}</div>}

      <div className="up-profile-section">
        <div className="up-avatar-wrapper">
          <img src={avatarUrl} alt="Avatar" className="up-avatar-large" />
        </div>
        <div className="up-profile-info">
          <h2 className="up-username">{username}</h2>
          <span className={`up-role-badge ${username === 'Nexus' ? 'owner' : 'member'}`}>{roleText}</span>
          
          <div className="up-action-buttons">
            <input 
              type="file" 
              ref={fileInputRef} 
              onChange={handleFileChange} 
              accept="image/*" 
              style={{ display: 'none' }} 
            />
            <button className="up-action-btn btn-avatar" onClick={() => fileInputRef.current.click()} disabled={loading}>
              <i className="ph-bold ph-image"></i> {loading ? "ĐANG TẢI LÊN..." : "Thay Avatar"}
            </button>
            <button className="up-action-btn btn-password" onClick={() => setShowPasswordInput(!showPasswordInput)}>
              <i className="ph-bold ph-lock"></i> Đổi Mật Khẩu
            </button>
          </div>
        </div>
      </div>

      {showPasswordInput && (
        <form onSubmit={handleUpdatePassword} className="up-inline-form flex-column">
          <input 
            type="password" 
            placeholder="Nhập mật khẩu hiện tại..." 
            value={currentPassword} 
            onChange={e => setCurrentPassword(e.target.value)}
            required 
          />
          <input 
            type="password" 
            placeholder="Nhập mật khẩu mới (tối thiểu 6 ký tự)..." 
            value={newPassword} 
            onChange={e => setNewPassword(e.target.value)}
            required 
          />
          <button type="submit" disabled={loading} style={{ alignSelf: 'flex-end' }}>Xác nhận đổi</button>
        </form>
      )}

      <div className="up-details-grid">
        <div className="up-detail-card full-width">
          <span className="up-card-label">Thời gian còn lại</span>
          <span className="up-card-value highlight">00:00:00 - 01/01/70</span>
        </div>
        
        <div className="up-detail-card full-width">
          <span className="up-card-label">Email</span>
          <span className="up-card-value">{userEmail}</span>
        </div>

        <div className="up-detail-card">
          <span className="up-card-label">Tình trạng tài khoản</span>
          <span className="up-card-value success">Bình thường</span>
        </div>

        <div className="up-detail-card">
          <span className="up-card-label">Lần đăng nhập gần nhất</span>
          <span className="up-card-value">{lastLogin}</span>
        </div>
      </div>
    </div>
  );
};

const TopBar = ({ activeTab, setActiveTab, zoom, setZoom, currentUser, userData }) => {
  const [showDropdown, setShowDropdown] = React.useState(false);
  const [showMembers, setShowMembers] = React.useState(false);
  const [members, setMembers] = React.useState([]);
  const [loadingMembers, setLoadingMembers] = React.useState(false);
  const [lastVisible, setLastVisible] = React.useState(null);
  const [hasMore, setHasMore] = React.useState(true);

  const fetchMembersList = async () => {
    setLoadingMembers(true);
    setHasMore(true);
    setLastVisible(null);
    try {
      const snapshot = await db.collection("users")
        .orderBy("uid")
        .limit(100)
        .get();
        
      const list = [];
      snapshot.forEach(doc => {
        list.push(doc.data());
      });
      setMembers(list);
      
      if (snapshot.docs.length > 0) {
        setLastVisible(snapshot.docs[snapshot.docs.length - 1]);
      }
      if (snapshot.docs.length < 100) {
        setHasMore(false);
      }
    } catch (err) {
      console.error("Lỗi lấy danh sách thành viên:", err);
    } finally {
      setLoadingMembers(false);
    }
  };

  const fetchMoreMembers = async () => {
    if (loadingMembers || !hasMore || !lastVisible) return;
    setLoadingMembers(true);
    try {
      const snapshot = await db.collection("users")
        .orderBy("uid")
        .startAfter(lastVisible)
        .limit(20)
        .get();
        
      const list = [];
      snapshot.forEach(doc => {
        list.push(doc.data());
      });
      
      setMembers(prev => [...prev, ...list]);
      
      if (snapshot.docs.length > 0) {
        setLastVisible(snapshot.docs[snapshot.docs.length - 1]);
      }
      if (snapshot.docs.length < 20) {
        setHasMore(false);
      }
    } catch (err) {
      console.error("Lỗi tải thêm thành viên:", err);
    } finally {
      setLoadingMembers(false);
    }
  };

  const handleScroll = (e) => {
    const target = e.target;
    if (target.scrollHeight - target.scrollTop - target.clientHeight < 40) {
      fetchMoreMembers();
    }
  };

  const handleToggleMembers = (e) => {
    e.stopPropagation();
    const nextState = !showMembers;
    setShowMembers(nextState);
    if (nextState && members.length === 0) {
      fetchMembersList();
    }
  };
  
  const handleLogout = (e) => {
    e.stopPropagation();
    auth.signOut();
    setShowDropdown(false);
  };
  
  // Close dropdown when clicking outside
  React.useEffect(() => {
    const clickOutside = () => {
      setShowDropdown(false);
      setShowMembers(false);
    };
    if (showDropdown || showMembers) {
      window.addEventListener('click', clickOutside);
    }
    return () => window.removeEventListener('click', clickOutside);
  }, [showDropdown, showMembers]);

  const username = userData && userData.displayName ? userData.displayName : (currentUser && currentUser.displayName ? currentUser.displayName : "Khách");
  const avatarUrl = userData && userData.avatar ? userData.avatar : (currentUser && currentUser.photoURL ? currentUser.photoURL : "https://ui-avatars.com/api/?name=Guest&background=333&color=fff");
  const role = userData && userData.role ? userData.role : (currentUser ? "THÀNH VIÊN" : "KHÁCH");

  return (
    <div className="topbar">
      <div className="topbar-left">
        <div 
          className={`top-nav-item ${activeTab === 'home' ? 'active-home' : ''}`}
          onClick={() => setActiveTab('home')}
        >
          <TopHomeIcon active={activeTab === 'home'} />
          <span>TRANG CHỦ</span>
        </div>
        <div 
          className={`top-nav-item ${activeTab === 'game' ? 'active-game' : ''}`}
          onClick={() => setActiveTab('game')}
        >
          <TopGameIcon active={activeTab === 'game'} />
          <span>TRÒ CHƠI</span>
        </div>
      </div>
      
      <div className="topbar-right">
        <button className="icon-btn"><i className="ph-bold ph-play"></i></button>
        <button className="icon-btn"><i className="ph-bold ph-package"></i></button>
        <button className="icon-btn"><i className="ph-bold ph-sun"></i></button>
        <button className="icon-btn"><i className="ph-bold ph-wallet"></i></button>
        
        <div className="user-profile-wrapper">
          <div className="user-profile-container" onClick={(e) => { e.stopPropagation(); setShowDropdown(!showDropdown); }}>
            <img src={avatarUrl} alt="Avatar" className="user-avatar" />
            <div className="user-info">
              <div className="user-name" style={{ display: 'flex', alignItems: 'center', gap: '4px' }}>
                {username} <i className="ph-bold ph-caret-down"></i>
              </div>
              <div className="user-role">{role}</div>
            </div>
          </div>
          {showDropdown && (
            <div className="user-dropdown" onClick={(e) => e.stopPropagation()}>
              <div className="dropdown-item edit-item" onClick={() => { setShowDropdown(false); setActiveTab('profile'); }}>
                <i className="ph-bold ph-house-line"></i> Trang Chủ
              </div>
              <div className="dropdown-item logout-item" onClick={handleLogout}>
                <i className="ph-bold ph-sign-out"></i> Đăng xuất
              </div>
            </div>
          )}
        </div>
        
        <div className="members-popover-wrapper" style={{ position: 'relative', display: 'flex', alignItems: 'center' }}>
          <button 
            className={`icon-btn ${showMembers ? 'active-members' : ''}`}
            onClick={handleToggleMembers}
            title="Danh sách thành viên"
          >
            <i className="ph-bold ph-users"></i>
          </button>
          {showMembers && (
            <MembersPopover 
              members={members} 
              loading={loadingMembers} 
              onRefresh={fetchMembersList}
              onScroll={handleScroll}
            />
          )}
        </div>
      </div>


    </div>
  );
};

const AuthPage = () => {
  const [isRegister, setIsRegister] = useState(false);
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [displayName, setDisplayName] = useState('');
  const [error, setError] = useState('');

  const handleSubmit = async (e) => {
    e.preventDefault();
    setError('');
    
    if (isRegister && !displayName.trim()) {
      setError('Vui lòng nhập tên hiển thị.');
      return;
    }
    if (password.length < 6) {
      setError('Mật khẩu phải dài ít nhất 6 ký tự.');
      return;
    }

    try {
      if (isRegister) {
        const res = await auth.createUserWithEmailAndPassword(email, password);
        const user = res.user;
        await user.updateProfile({ displayName: displayName });
        
        await db.collection("users").doc(user.uid).set({
          uid: user.uid,
          displayName: displayName,
          email: email,
          greenCoins: 0,
          goldTickets: 0,
          role: "THÀNH VIÊN",
          avatar: `https://ui-avatars.com/api/?name=${encodeURIComponent(displayName)}&background=00d8e6&color=000&rounded=true&font-size=0.6`
        });
      } else {
        await auth.signInWithEmailAndPassword(email, password);
      }
    } catch (err) {
      console.error(err);
      let userFriendlyMsg = err.message;
      if (err.code === 'auth/email-already-in-use') {
        userFriendlyMsg = 'Email này đã được sử dụng bởi một tài khoản khác.';
      } else if (err.code === 'auth/weak-password') {
        userFriendlyMsg = 'Mật khẩu quá yếu.';
      } else if (err.code === 'auth/invalid-email') {
        userFriendlyMsg = 'Định dạng email không chính xác.';
      } else if (err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password') {
        userFriendlyMsg = 'Email hoặc mật khẩu không chính xác.';
      }
      setError(userFriendlyMsg);
    }
  };

  return (
    <div className="auth-page-container">
      <div className="auth-modal-box">
        <h2 className="auth-title">
          {isRegister ? "ĐĂNG KÝ HỆ THỐNG" : "ĐĂNG NHẬP HỆ THỐNG"}
        </h2>
        
        {error && <div className="auth-error-msg">{error}</div>}
        
        <form onSubmit={handleSubmit} className="auth-form">
          {isRegister && (
            <input 
              type="text" 
              placeholder="TÊN HIỂN THỊ (NICKNAME)" 
              value={displayName} 
              onChange={e => setDisplayName(e.target.value)} 
              required 
            />
          )}
          <input 
            type="email" 
            placeholder="EMAIL ĐĂNG NHẬP" 
            value={email} 
            onChange={e => setEmail(e.target.value)} 
            required 
          />
          <input 
            type="password" 
            placeholder="MẬT KHẨU" 
            value={password} 
            onChange={e => setPassword(e.target.value)} 
            required 
          />
          <button type="submit" className="auth-submit-btn">
            {isRegister ? "TẠO TÀI KHOẢN" : "ĐĂNG NHẬP CLIENT"}
          </button>
        </form>
        
        <p className="auth-toggle-text">
          {isRegister ? "Đã có tài khoản?" : "Chưa có tài khoản?"} &nbsp;
          <span onClick={() => { setIsRegister(!isRegister); setError(''); }}>
            {isRegister ? "Đăng nhập tại đây" : "Đăng ký tài khoản miễn phí"}
          </span>
        </p>
      </div>
    </div>
  );
};

// Cache header_image theo appId (tranh refetch khi scroll lai). Module-level, song toan app.
const HEADER_CACHE = new Map();

const GameCard = ({ game, onClick }) => {
  const mediaData = STEAM_MEDIA[String(game.appId)];
  const hasHardcode = !!(mediaData && mediaData.header_image);
  // Cover ban dau: hardcode (25 game cu) hoac CDN cu (da hoat dong cho 90%+ game, KHONG can fetch serverless).
  const initialCover = hasHardcode
    ? mediaData.header_image
    : (HEADER_CACHE.get(game.appId) || `${STEAM_CDN}/${game.appId}/header.jpg`);
  const [coverUrl, setCoverUrl] = React.useState(initialCover);
  const PLACEHOLDER = "https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&w=500&q=60";

  // KHONG fetch serverless khi mount — CDN cu da hoat dong. Chi fetch khi onError (lazy).
  // Cu truoc day: fetch 164 request ngay khi load home -> cham 1-2s. Bay gio: 0 request khi CDN OK.

  // onError: CDN cu fail -> fetch serverless lay header_image day du -> placeholder.
  // Don gian, khong gan img.onerror trung gian (tranh race condition).
  const handleCoverError = (e) => {
    const img = e.target;
    img.onerror = null;  // ngan loop
    if (HEADER_CACHE.has(game.appId)) {
      setCoverUrl(HEADER_CACHE.get(game.appId));
      return;
    }
    // Fetch serverless lay header_image day du (co hash) cho game CDN fail.
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 5000);
    fetch(`/api/steammedia?appid=${game.appId}`, { signal: ctrl.signal })
      .then(r => r.ok ? r.json() : Promise.reject(new Error('HTTP ' + r.status)))
      .then(data => {
        if (!ctrl.signal.aborted && data && data.header_image) {
          HEADER_CACHE.set(game.appId, data.header_image);
          setCoverUrl(data.header_image);
        } else {
          setCoverUrl(PLACEHOLDER);
        }
      })
      .catch(() => setCoverUrl(PLACEHOLDER))
      .finally(() => clearTimeout(timer));
  };
  return (
    <div className="game-card" onClick={() => onClick(game)}>
      <div className="game-cover-wrapper">
        <img src={coverUrl} alt={game.title} className="game-cover" onError={handleCoverError} loading="lazy" decoding="async" fetchpriority="high" />
      </div>
      <div className="game-info">
        <div className="game-title">
          {game.title}
          <i className="fa-brands fa-steam"></i>
        </div>
        <div className="game-meta">
          <div className="meta-icons">
            <span><i className="ph ph-user"></i></span>
            {game.percent && !game.percent.includes('-') && (
               <span className="cyan"><i className="ph ph-infinity"></i></span>
            )}
            {game.percent && (
               <span className={game.percent.includes('-') ? '' : 'cyan'}><i className="ph ph-thumbs-up"></i> {game.percent}</span>
            )}
          </div>
          {game.viethoa && (
            <div className="lang-tag-yellow">
              <i className="ph ph-translate"></i> VIỆT HÓA
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

const GameDetail = ({ game, onBack }) => {
  const [activeMediaIndex, setActiveMediaIndex] = React.useState(0);
  const [activeRightTab, setActiveRightTab] = React.useState('info');
  
  // Tag + % đánh giá + số lượng đánh giá = CỐ ĐỊNH (từ GAME_DATA, số hôm nay).
  // Hình/video/thumbnail dùng Steam CDN (STEAM_MEDIA) — không liên quan tới đây.
  const [steamPercent, setSteamPercent] = React.useState(game.percent);
  const [steamReviewText, setSteamReviewText] = React.useState(game.reviewText);
  const [steamReviewCount, setSteamReviewCount] = React.useState(game.reviewCount);
  const [steamTags, setSteamTags] = React.useState(game.tags || []);

  // liveMedia: JSON từ /api/steammedia (Vercel serverless) — screenshot/video tươi.
  // null khi chưa fetch xong hoặc fail → validMedia fallback STEAM_MEDIA hardcode.
  const [liveMedia, setLiveMedia] = React.useState(null);
  // liveSysreq: cấu hình game tươi từ Steam (os, cpu, ram, gpu, dx, storage, audio, note).
  // null khi chưa fetch xong hoặc fail → render fallback game.sysreq (hardcode, có thể rỗng).
  const [liveSysreq, setLiveSysreq] = React.useState(null);

  // ====== NÚT "Click Vào Đây Để Truy Cập" — state machine ======
  // accessState: 'idle' | 'checking' | 'installing_nexust' | 'disabling_wu' | 'writing_registry' | 'sharing'
  // accessNote: note dưới nút (lỗi/thông báo). Trống = không hiện.
  const [accessState, setAccessState] = React.useState('idle');
  const [accessNote, setAccessNote] = React.useState('');
  const accessApiRef = React.useRef(null);  // cache window.pywebview.api ref

  // ====== NÚT "Fix Game" — chỉ vài game online có (game.fix). Fix online crack. ======
  // fixState: 'idle' | 'fixing'
  // fixNote: note dưới nút Fix Game (lỗi/thông báo). Trống = không hiện.
  const hasFix = !!(game.fix && game.fix.driveId && game.fix.password && game.fix.gameExe && game.fix.gameFolder);
  const [fixState, setFixState] = React.useState('idle');
  const [fixNote, setFixNote] = React.useState('');

  // ====== KHUNG "Redeem Code" — chỉ vài game có Denuvo (game.redeem). TokeerDRM redeem. ======
  // redeemState: 'idle' | 'redeeming'
  // redeemNote: note dưới khung (lỗi/thông báo). Trống = không hiện.
  const hasRedeem = !!game.redeem;
  const [redeemCode, setRedeemCode] = React.useState('');
  const [redeemState, setRedeemState] = React.useState('idle');
  const [redeemNote, setRedeemNote] = React.useState('');

  // Flow: nhập 6 ký tự → bấm Redeem → validate 6 ký tự → check custom DLL → POST server →
  // verify app_id match → ghi registry. Sai 6 ký tự → "Sai Mã, Vui Lòng Thử Lại".
  // Chưa cài NexusT → "Bạn Chưa Cài Đặt NexusT". Sai game → "Code Này Phải Kích Hoạt Ở Game Khác".
  const handleRedeemClick = async () => {
    if (redeemState !== 'idle') return;
    setRedeemNote('');
    // Validate 6 ký tự (letters/digits, case-insensitive).
    const clean = (redeemCode || '').trim();
    if (clean.length !== 6) {
      setRedeemNote('Sai Mã, Vui Lòng Thử Lại');
      return;
    }
    let api;
    try { api = window.pywebview && window.pywebview.api; } catch (e) {}
    if (!api) {
      setRedeemNote('Vui lòng mở qua ứng dụng NexusGames để redeem code');
      return;
    }
    setRedeemState('redeeming');
    try {
      const r = await api.redeem_code(clean, String(game.appId));
      if (!r) {
        setRedeemState('idle');
        setRedeemNote('Lỗi redeem không xác định');
        return;
      }
      if (r.invalid) {
        setRedeemState('idle');
        setRedeemNote('Sai Mã, Vui Lòng Thử Lại');
        return;
      }
      if (r.not_installed) {
        setRedeemState('idle');
        setRedeemNote('Bạn Chưa Cài Đặt NexusT');
        return;
      }
      if (r.wrong_game) {
        setRedeemState('idle');
        setRedeemNote('Code Này Phải Kích Hoạt Ở Game Khác');
        return;
      }
      if (r.code_not_found) {
        setRedeemState('idle');
        setRedeemNote('Sai Mã, Vui Lòng Thử Lại');
        return;
      }
      if (r.success) {
        setRedeemState('idle');
        setRedeemCode('');
        const uses = (r.uses_remaining !== undefined && r.uses_remaining !== null) ? (' (còn ' + r.uses_remaining + ' lượt)') : '';
        setRedeemNote('Đã Kích Hoạt Game Thành Công' + uses);
      } else {
        setRedeemState('idle');
        setRedeemNote((r.error) ? ('Lỗi redeem: ' + r.error) : 'Lỗi redeem không xác định');
      }
    } catch (e) {
      setRedeemState('idle');
      setRedeemNote('Lỗi: ' + (e && e.message ? e.message : String(e)));
    }
  };

  // Flow: bấm Fix Game → check Steam path → gọi api.fix_game (gdown + giải nén + merge).
  const handleFixClick = async () => {
    if (fixState !== 'idle') return;
    let api;
    try { api = window.pywebview && window.pywebview.api; } catch (e) {}
    if (!api) {
      setFixNote('Vui lòng mở qua ứng dụng NexusGames để fix game');
      return;
    }
    setFixNote('');
    setFixState('fixing');
    try {
      const steam = await api.check_steam();
      if (!steam || !steam.installed) {
        setFixState('idle');
        setFixNote('Chưa Cài Đặt Steam, Vui Lòng Cài Đặt Steam Trước Khi Fix Game');
        return;
      }
      const r = await api.fix_game(steam.path, game.fix);
      if (!r) {
        setFixState('idle');
        setFixNote('Lỗi fix game không xác định');
        return;
      }
      if (r.not_installed) {
        setFixState('idle');
        setFixNote('Bạn chưa cài đặt game');
        return;
      }
      if (r.success) {
        setFixState('idle');
        setFixNote('Đã Fix Game Hoàn Tất');
      } else {
        setFixState('idle');
        setFixNote((r.error) ? ('Lỗi fix game: ' + r.error) : 'Lỗi fix game không xác định');
      }
    } catch (e) {
      setFixState('idle');
      setFixNote('Lỗi: ' + (e && e.message ? e.message : String(e)));
    }
  };

  // Flow: bấm nút → check Steam → check NexusT → (cài NexusT nếu thiếu) → share game.
  const handleAccessClick = async () => {
    if (accessState !== 'idle') return;  // đang xử lý → bỏ qua click thêm
    // Lấy bridge Python (pywebview js_api). Không có = mở browser, không có Python.
    let api;
    try {
      api = window.pywebview && window.pywebview.api;
    } catch (e) {}
    if (!api) {
      setAccessNote('Vui lòng mở qua ứng dụng NexusGames để truy cập game');
      return;
    }
    accessApiRef.current = api;

    setAccessNote('');
    setAccessState('checking');
    try {
      // 1. Check Steam.
      const steam = await api.check_steam();
      if (!steam || !steam.installed) {
        setAccessState('idle');
        setAccessNote('Chưa Cài Đặt Steam, Vui Lòng Cài Đặt Steam Trước Khi Truy Cập Game');
        return;
      }
      // 2. Check NexusT.
      const nexust = await api.check_nexust(steam.path);
      if (!nexust || !nexust.installed) {
        // 2a. Chưa có → cài NexusT.
        setAccessState('installing_nexust');
        const r1 = await api.install_nexust(steam.path);
        if (!r1 || !r1.success) {
          setAccessState('idle');
          setAccessNote((r1 && r1.error) ? ('Lỗi cài NexusT: ' + r1.error) : 'Lỗi cài NexusT không xác định');
          return;
        }
      }
      // 3. Write registry (AppTicket + ETicket) — chỉ cho game có redeem (Denuvo).
      //    Chen TRUOC share_game. Non-redeem game -> skip (method trả skipped:true).
      if (game.redeem === true) {
        // 3a. Check + disable Windows Update (only 22 game Denuvo redeem).
        //     Fail (UAC declined / loi) -> warning, KHONG return — continue flow.
        setAccessState('disabling_wu');
        const rw = await api.disable_windows_update();
        if (rw && rw.warning) {
          setAccessNote(rw.warning);  // warning, flow continues
        } else if (rw && rw.disabled) {
          setAccessNote('Đã Tắt Windows Update Hoàn Tất');
        }
        // skipped -> silent (WU đã off từ trước).

        // 3b. Write registry (AppTicket + ETicket) cho game Denuvo.
        setAccessState('writing_registry');
        const rt = await api.write_registry_tickets(String(game.appId));
        if (!rt || !rt.success) {
          setAccessState('idle');
          setAccessNote((rt && rt.error) ? ('Lỗi ghi registry: ' + rt.error) : 'Lỗi ghi registry không xác định');
          return;
        }
      }
      // 4. Share game.
      setAccessState('sharing');
      const r2 = await api.share_game(steam.path, String(game.appId));
      if (!r2) {
        setAccessState('idle');
        setAccessNote('Lỗi share game không xác định');
        return;
      }
      if (r2.already) {
        setAccessNote('Bạn Đã Có Game Này');
      } else if (r2.success) {
        setAccessNote('Đã Share Game Qua Tài Khoản Steam Của Bạn Hoàn Tất');
      } else {
        setAccessNote((r2.error) ? ('Lỗi share game: ' + r2.error) : 'Lỗi share game không xác định');
      }
      setAccessState('idle');
    } catch (e) {
      setAccessState('idle');
      setAccessNote('Lỗi: ' + (e && e.message ? e.message : String(e)));
    }
  };

  const mediaRefs = React.useRef([]);
  const wasPlayingRef = React.useRef(false);

  const galleryRef = React.useRef(null);
  const dragState = React.useRef({ down: false, moved: false, startX: 0, scrollLeft: 0, pointerId: null });
  const rafRef = React.useRef(null);
  const [isDragging, setIsDragging] = React.useState(false);

  const DRAG_THRESHOLD = 6;

  const handlePointerDown = (e) => {
    if (e.button !== undefined && e.button !== 0) return;
    const el = galleryRef.current;
    if (!el) return;
    try {
      el.setPointerCapture(e.pointerId);
    } catch (err) {}
    dragState.current = {
      down: true,
      moved: false,
      startX: e.clientX,
      scrollLeft: el.scrollLeft,
      pointerId: e.pointerId,
    };
  };

  const handlePointerMove = (e) => {
    const s = dragState.current;
    if (!s.down) return;

    if (e.buttons !== 1) {
      endDrag(e);
      return;
    }

    const el = galleryRef.current;
    if (!el) return;
    const dx = e.clientX - s.startX;
    if (!s.moved && Math.abs(dx) > DRAG_THRESHOLD) {
      s.moved = true;
      setIsDragging(true);
    }
    if (s.moved) {
      e.preventDefault();
      el.scrollLeft = s.scrollLeft - dx;
    }
  };

  const endDrag = (e) => {
    const s = dragState.current;
    if (!s.down) return;

    const el = galleryRef.current;
    if (el && s.pointerId !== null) {
      try {
        el.releasePointerCapture(s.pointerId);
      } catch (err) {}
    }

    if (!s.moved && e && typeof e.clientX === 'number') {
      const target = document.elementFromPoint(e.clientX, e.clientY);
      const item = target && target.closest ? target.closest('.gd-gallery-item') : null;
      if (item && item.dataset && item.dataset.index !== undefined) {
        setActiveMediaIndex(Number(item.dataset.index));
      }
    }
    s.down = false;
    s.moved = false;
    s.pointerId = null;
    setIsDragging(false);
  };

  // Dung Steam CDN screenshots + trailer tu game.media (hoặc liveMedia nếu fetch OK)
  const validMedia = React.useMemo(() => {
    // liveMedia ưu tiên — ảnh/video tươi từ Steam serverless (gần 100%, 0.5-1.5s).
    if (liveMedia) return buildGameMedia(game.appId, liveMedia);
    // Fallback: STEAM_MEDIA hardcode (ổn định, luôn hiện, không chờ).
    if (game.media && game.media.length > 0) return game.media;
    // Fallback cuối: header image.
    return [{ type: 'image', src: `https://cdn.cloudflare.steamstatic.com/steam/apps/${game.appId}/header.jpg`, key: 'header' }];
  }, [game, liveMedia]);

  React.useEffect(() => {
    setActiveMediaIndex(0);
  }, [game]);

  // FETCH MEDIA TƯƠI TỪ STEAM (serverless) — ảnh/video tự khớp Steam mỗi lần mở game.
  // Vercel serverless /api/steammedia fetch server-side (không CORS, không proxy công khai).
  // Timeout 8s (AbortController) — fail/timeout → giữ STEAM_MEDIA hardcode (luôn hiện ảnh).
  React.useEffect(() => {
    setLiveMedia(null);
    setLiveSysreq(null);
    // Cache sessionStorage: mo game lai khong refetch (giam 3-5s -> 0s).
    const cacheKey = `steam_media_${game.appId}`;
    try {
      const cached = sessionStorage.getItem(cacheKey);
      if (cached) {
        const data = JSON.parse(cached);
        if (data.movies || data.screenshots) setLiveMedia(data);
        if (data.sysreq && Object.keys(data.sysreq).length > 0) setLiveSysreq(data.sysreq);
        return;
      }
    } catch (e) {}
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 5000);  // 8s -> 5s
    fetch(`/api/steammedia?appid=${game.appId}`, { signal: ctrl.signal })
      .then(res => (res.ok ? res.json() : Promise.reject(new Error(`HTTP ${res.status}`))))
      .then(data => {
        if (ctrl.signal.aborted) return;
        // Cache vao sessionStorage cho lan mo sau
        try { sessionStorage.setItem(cacheKey, JSON.stringify(data)); } catch (e) {}
        if (data && (data.movies || data.screenshots)) {
          setLiveMedia(data);
        }
        if (data && data.sysreq && Object.keys(data.sysreq).length > 0) {
          setLiveSysreq(data.sysreq);
        }
      })
      .catch(err => {
        if (err.name !== 'AbortError') console.error('Steam media fetch fail, giữ hardcode:', err.message);
      })
      .finally(() => clearTimeout(timer));
    return () => { clearTimeout(timer); ctrl.abort(); };
  }, [game]);

  // HIỂN THỊ TAG + % ĐÁNH GIÁ + SỐ LƯỢNG ĐÁNH GIÁ = CỐ ĐỊNH (lấy từ SteamDB/Steam website).
  // Lý do: fetch qua proxy Steam API chậm kinh khủng, rate game nổi tăng liên tục
  // nên cố định = số hôm nay (update tay khi cần). KHÔNG còn code gọi CDN/API lấy rate/tag.
  // Lưu ý: hình/video/thumbnail VẪN dùng Steam CDN (STEAM_MEDIA) — KHÔNG đụng.
  React.useEffect(() => {
    setSteamPercent(game.percent);
    setSteamReviewText(game.reviewText);
    setSteamReviewCount(game.reviewCount);
    setSteamTags(game.tags || []);
    // Reset nút truy cập về idle + xóa note khi đổi game.
    setAccessState('idle');
    setAccessNote('');
    // Reset nút Fix Game về idle + xóa note khi đổi game.
    setFixState('idle');
    setFixNote('');
    // Reset khung Redeem Code về idle + xóa input/note khi đổi game.
    setRedeemCode('');
    setRedeemState('idle');
    setRedeemNote('');
  }, [game]);

  React.useEffect(() => {
    const handleLeave = () => {
      const v = mediaRefs.current[activeMediaIndex];
      if (!v || v.tagName !== 'VIDEO') return;
      if (!v.paused && !v.ended) {
        wasPlayingRef.current = true;
        v.pause();
      }
    };
    const handleReturn = () => {
      const v = mediaRefs.current[activeMediaIndex];
      if (!v || v.tagName !== 'VIDEO') return;
      if (wasPlayingRef.current) {
        wasPlayingRef.current = false;
        v.play().catch(() => {});
      }
    };
    const onVisibility = () => {
      if (document.hidden) handleLeave();
      else handleReturn();
    };
    document.addEventListener('visibilitychange', onVisibility);
    window.addEventListener('blur', handleLeave);
    window.addEventListener('focus', handleReturn);
    return () => {
      document.removeEventListener('visibilitychange', onVisibility);
      window.removeEventListener('blur', handleLeave);
      window.removeEventListener('focus', handleReturn);
    };
  }, [activeMediaIndex]);

  // Steam CDN media - lay tu game.media
  // (Phan nay da duoc xu ly boi useMemo o tren)

  // Effect 1: Khoi tao HLS cho DUY NHAT active video (lazy-load).
  // Truoc day attach HLS cho TAT CA trailer cung luc -> game co nhieu trailer
  // (vd 1091500 = 12 video) -> 12 stream den cung host video.akamai.steamstatic.com
  // -> browser limit 6 connection/host -> 6+ stream bi queue -> stuck 0:00.
  // Fix: chi attach HLS cho active video; video khac chi hien poster, detach HLS
  // de giai phong connection. Khi user click chon video khac -> attach moi.
  React.useEffect(() => {
    mediaRefs.current.forEach((el, i) => {
      if (!el || el.tagName !== 'VIDEO') return;
      const media = validMedia[i];
      if (!media || media.type !== 'video' || !media.src) return;

      const isActive = (i === activeMediaIndex);

      if (!isActive) {
        // Video khong active -> giai phong HLS + src de don connection cho active video.
        if (el.hlsInstance) {
          el.hlsInstance.destroy();
          delete el.hlsInstance;
        }
        delete el.dataset.currentSrc;
        try { el.removeAttribute('src'); el.load(); } catch (e) {}
        el.pause();
        return;
      }

      // Active video: bo qua neu da attach dung src nay (tranh re-init khi Effect chay lai).
      if (el.dataset.currentSrc === media.src && el.hlsInstance) return;
      // Xoa HLS cu neu doi src.
      if (el.hlsInstance) {
        el.hlsInstance.destroy();
        delete el.hlsInstance;
      }
      el.dataset.currentSrc = media.src;

      if (media.src.includes('.m3u8')) {
        if (window.Hls && window.Hls.isSupported()) {
          const hls = new window.Hls({
            maxMaxBufferLength: 30,
            maxBufferLength: 15,
            enableWorker: true,
            lowLatencyMode: false,
            manifestLoadingTimeOut: 20000,
            manifestLoadingMaxRetry: 4,
            levelLoadingTimeOut: 20000,
            fragLoadingTimeOut: 30000,
          });
          // MANIFEST_PARSED: HLS da load xong manifest -> play (active video).
          hls.on(window.Hls.Events.MANIFEST_PARSED, () => {
            if (el.dataset.isActive === '1') {
              el.play().catch(() => {});
            }
          });
          // Error recovery: NETWORK -> retry (gioi han 3 lan roi destroy de khong lap vo han),
          // MEDIA -> recover, other -> destroy.
          let netRetry = 0;
          hls.on(window.Hls.Events.ERROR, (event, data) => {
            if (!data || !data.fatal) return;
            switch (data.type) {
              case window.Hls.ErrorTypes.NETWORK_ERROR:
                netRetry++;
                if (netRetry > 3) {
                  console.error('HLS network error het retry, destroy:', data.details);
                  hls.destroy();
                  delete el.hlsInstance;
                } else {
                  console.warn('HLS network error, retry', netRetry, ':', data.details);
                  setTimeout(() => { try { hls.startLoad(); } catch (e) {} }, 1000 * netRetry);
                }
                break;
              case window.Hls.ErrorTypes.MEDIA_ERROR:
                console.warn('HLS media error, recover:', data.details);
                hls.recoverMediaError();
                break;
              default:
                console.error('HLS fatal error, destroy:', data.type, data.details);
                hls.destroy();
                delete el.hlsInstance;
                break;
            }
          });
          hls.loadSource(media.src);
          hls.attachMedia(el);
          el.hlsInstance = hls;
        } else {
          el.src = media.src;
        }
      } else {
        el.src = media.src;
      }
    });

    return () => {
      // Cleanup khi validMedia thay doi: destroy tat ca HLS.
      mediaRefs.current.forEach((el) => {
        if (el && el.hlsInstance) {
          el.hlsInstance.destroy();
          delete el.hlsInstance;
        }
      });
    };
  }, [validMedia, activeMediaIndex]);


  // Effect 2: Dieu khien play/pause dua tren activeMediaIndex
  // Set dataset.isActive de MANIFEST_PARSED / onCanPlay biet co nen play khong.
  React.useEffect(() => {
    mediaRefs.current.forEach((el, i) => {
      if (el && el.tagName === 'VIDEO') {
        if (i === activeMediaIndex) {
          el.dataset.isActive = '1';
          el.play().catch(() => {});
        } else {
          el.dataset.isActive = '0';
          el.pause();
          el.currentTime = 0.01;
        }
      }
    });
  }, [activeMediaIndex, validMedia]);

  return (
    <div className="content-area game-detail-container">
      <div className="gd-content">
        <div className="gd-left">
          <div className="gd-header">
            <button className="gd-back-btn" onClick={onBack}>
              <i className="ph-bold ph-arrow-left"></i> Back
            </button>
          </div>
          <div className="gd-media-stage">
          <div
            className="gd-main-media"
            style={{ position: 'relative' }}
          >
            {activeMediaIndex === 0 && validMedia.length > 0 && <div className="gd-media-title">{game.title}</div>}
            {validMedia.map((media, index) => {
              const isActive = index === activeMediaIndex;
              if (media.type === 'video') {
                return (
                  <video
                    key={media.src}
                    ref={(el) => mediaRefs.current[index] = el}
                    poster={media.thumbSrc}
                    controls={isActive}
                    muted
                    playsInline
                    preload="auto"
                    onLoadedMetadata={(e) => {
                      const v = e.currentTarget;
                      if (!v.dataset.warmed) {
                        v.dataset.warmed = 'true';
                        v.currentTime = 0.01;
                      }
                    }}
                    onCanPlay={(e) => {
                      // Backup play: khi video that su ready (HLS load xong segment dau),
                      // play neu active. Fix race condition Effect 2 chay truoc HLS attach.
                      if (e.currentTarget.dataset.isActive === '1') {
                        e.currentTarget.play().catch(() => {});
                      }
                    }}
                    style={{width: '100%', height: '100%', objectFit: 'cover', position: 'absolute', top: 0, left: 0, opacity: isActive ? 1 : 0, pointerEvents: isActive ? 'auto' : 'none', zIndex: isActive ? 1 : 0}}
                  />
                );
              } else {
                return (
                  <img
                    key={media.src}
                    ref={(el) => mediaRefs.current[index] = el}
                    src={media.src}
                    alt={game.title}
                    style={{width: '100%', height: '100%', objectFit: 'cover', position: 'absolute', top: 0, left: 0, opacity: isActive ? 1 : 0, pointerEvents: isActive ? 'auto' : 'none', zIndex: isActive ? 1 : 0}}
                  />
                );
              }
            })}
          </div>
          </div>
          {validMedia.length > 0 && (
            <div
              className={`gd-gallery ${isDragging ? 'dragging' : ''}`}
              ref={galleryRef}
              onPointerDown={handlePointerDown}
              onPointerMove={handlePointerMove}
              onPointerUp={endDrag}
              onPointerCancel={endDrag}

              {validMedia.map((media, i) => (
                <div

                        <img src={media.thumbSrc} alt={`Thumb ${i}`} draggable="false" style={{ width: '100%', height: '100%', objectFit: 'cover' }} onError={(e) => { e.target.style.display = 'none'; }} />
                      )}
                      <div style={{ position: 'absolute', top: '50%', left: '50%', transform: 'translate(-50%, -50%)', background: 'rgba(0,0,0,0.5)', borderRadius: '50%', width: '36px', height: '36px', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>

            </div>
          )}
        </div>

        <div className="gd-right">
          <div className="gd-actions-top">
            <button 
              className={`icon-btn ${activeRightTab === 'info' ? 'active' : ''}`}
              onClick={() => setActiveRightTab('info')}

              <div className="gd-box" style={{marginBottom: '16px'}}>
                <div style={{color: '#fff', fontSize: '13px', fontWeight: '800', display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '16px', fontFamily: "'Saira', sans-serif"}}>

                </div>
                <ul className="sysreq-list">
                  <li><i className="ph ph-check"></i> Yêu cầu vi xử lý và hệ điều hành đều chạy 64-bit</li>
                  <li><i className="ph ph-check"></i> <strong>HĐH:</strong> {(liveSysreq || game.sysreq) ? (liveSysreq || game.sysreq).os : 'N/A'}</li>
                  <li><i className="ph ph-check"></i> <strong>Bộ xử lý:</strong> {(liveSysreq || game.sysreq) ? (liveSysreq || game.sysreq).cpu : 'N/A'}</li>
                  <li><i className="ph ph-check"></i> <strong>Bộ nhớ:</strong> {(liveSysreq || game.sysreq) ? (liveSysreq || game.sysreq).ram : 'N/A'}</li>
                  <li><i className="ph ph-check"></i> <strong>Đồ họa:</strong> {(liveSysreq || game.sysreq) ? (liveSysreq || game.sysreq).gpu : 'N/A'}</li>
                  {(liveSysreq || game.sysreq) && (liveSysreq || game.sysreq).dx && (

const MainContent = ({ selectedGame, setSelectedGame }) => {
  const [searchQuery, setSearchQuery] = React.useState('');

  if (selectedGame) {
    return <GameDetail game={selectedGame} onBack={() => setSelectedGame(null)} />;
  }

  // Sort theo title (alphabet, case-insensitive) — nhóm game cùng series gần nhau
  // (Dead Space, Dead Space 2, Dead Space 3 / Resident Evil 2,3,4,7 / Dragon Ball...).
  const sortKey = (t) => t.toLowerCase().replace(/[™®©]/g, '').trim();
  const filteredGames = GAME_DATA.filter(game => {
    if (searchQuery && !game.title.toLowerCase().includes(searchQuery.toLowerCase())) return false;
    return true;
  }).sort((a, b) => sortKey(a.title).localeCompare(sortKey(b.title), 'en', { sensitivity: 'base' }));

  return (
    <div className="content-area">
      <div style={{ display: 'flex', justifyContent: 'center', marginBottom: '24px' }}>
        <div className="search-filter-container">
          <div className="sf-search">
            <i className="ph ph-magnifying-glass"></i>
            <input 
              type="text" 
              placeholder="Tìm kiếm trò chơi..." 
              className="search-input" 
              value={searchQuery}
              onChange={(e) => setSearchQuery(e.target.value)}
            />
          </div>
        </div>
      </div>
      
      <div className="section-title" style={{marginBottom: '16px'}}>
        DANH SÁCH TRÒ CHƠI <span style={{fontSize: '14px', color: 'var(--text-muted)', fontWeight: '600', marginLeft: '8px'}}>{filteredGames.length} kết quả</span>
      </div>
      
      <div className="game-grid">
        {filteredGames.length > 0 ? filteredGames.map(game => (
          <GameCard key={game.id} game={game} onClick={setSelectedGame} />
        )) : (
          <div style={{color: 'var(--text-muted)', padding: '40px', textAlign: 'center', width: '100%', gridColumn: '1 / -1'}}>
            Không tìm thấy trò chơi nào phù hợp.
          </div>
        )}
      </div>
      
      <div className="chat-btn">
        <i className="fa-solid fa-comment-dots"></i>
      </div>
    </div>
  );
};

      <div className="bento-grid">

              <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=250&q=80" alt="NexusHideout" />
            </div>
            <div className="bento-profile-id">
              <div className="bento-status"><span className="status-dot"></span> ONLINE</div>

            <button className="btn-primary" onClick={() => window.open('https://github.com/KLKK93', '_blank')}><i className="ph-bold ph-github-logo"></i> GitHub</button>
            <button className="btn-secondary" onClick={() => window.open('https://discord.gg/fsQW3FaNnG', '_blank')}><i className="ph-bold ph-discord-logo"></i> Discord</button>

        <div className="bento-cell bento-stat">

        <div className="bento-cell bento-tech">
          <div className="bento-cell-head"><i className="ph ph-code"></i> TECH STACK</div>

            <div className="tech-item"><i className="fa-brands fa-js"></i> ES6+</div>
            <div className="tech-item"><i className="fa-brands fa-css3-alt"></i> Modern CSS</div>

};

const NotSupportedContent = ({ platform }) => {
  const platformNames = {
    'revoltpc': 'REVOLTPC',
    'battle': 'BATTLE.NET',
    'eaplay': 'EA PLAY',
    'xbox': 'XBOX',
    'epic': 'EPIC GAMES'
  };
  
  return (
    <div className="content-area" style={{display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', height: '100%'}}>
      <i className="ph-bold ph-warning-circle" style={{fontSize: '80px', color: '#282a31', marginBottom: '24px'}}></i>
      <h2 style={{fontSize: '28px', fontWeight: '900', color: '#fff', marginBottom: '12px', letterSpacing: '1px'}}>NỀN TẢNG CHƯA HỖ TRỢ</h2>
      <p style={{color: 'var(--text-muted)', fontSize: '15px', maxWidth: '450px', textAlign: 'center', lineHeight: '1.6'}}>
        Hệ thống hiện tại chưa kết nối đồng bộ kho dữ liệu của <strong style={{color: 'var(--accent-cyan)'}}>{platformNames[platform]}</strong>. Tính năng này sẽ sớm được cập nhật trong tương lai!
      </p>
    </div>
  );
};

// ===== GATE: token poll (webview inject token, browser khong co = lock) =====
// 5.py (webview) inject window.__NEXUS_TOKEN (32 hex) sau khi page load.
// Site poll moi 50ms, deadline 2s: co token = unlock, het 2s khong co = lock.
// Khong dung fetch/localhost -> khong bi Private Network Access chan.
function checkToken() {
  return new Promise((resolve) => {
    const deadline = Date.now() + 2000;
    const poll = () => {
      const t = window.__NEXUS_TOKEN;
      if (typeof t === 'string' && /^[a-f0-9]{32}$/.test(t)) {
        resolve(true);
        return;
      }
      if (Date.now() >= deadline) { resolve(false); return; }
      setTimeout(poll, 50);
    };
    poll();
  });
}

const App = () => {
    // TAM BO GATE: set 'ok' truc tiep de test code (khong check 5.py).
    // De bat lai: doi thanh const [gate, setGate] = React.useState('checking');
    // va uncomment React.useEffect checkToken ben duoi.
    const [gate, setGate] = React.useState('ok');

    /* GATE CHECK — TAM TAT
    React.useEffect(() => {
        let active = true;
        checkToken().then(ok => { if (active) setGate(ok ? 'ok' : 'locked'); });
        return () => { active = false; };
    }, []);
    */

    const retryGate = () => {
        setGate('checking');
        checkToken().then(ok => setGate(ok ? 'ok' : 'locked'));
    };

    // ===== GLOBAL SCALE: Đã được chuyển đổi sang CSS Fluid Responsive (Nexus Launcher Style) =====
    // Không dùng transform: scale() để tránh mờ chữ, sai tọa độ và lệch tỉ lệ trên màn hình phụ.
    // Giao diện tự động co giãn bằng CSS Flexbox/Grid và đơn vị tương đối.

  const [zoom, setZoom] = React.useState(() => {
    const savedZoom = localStorage.getItem('nexus_zoom');
    if (savedZoom !== null) return parseFloat(savedZoom);
    
    // Tự động tối ưu hóa tỉ lệ bắt đầu dựa theo kích thước màn hình ngang
    const width = window.innerWidth;
    if (width >= 1600) return 1.0;
    if (width >= 1366) return 0.95;
    return 0.90;
  });

  React.useEffect(() => {
    document.body.style.zoom = zoom;
    localStorage.setItem('nexus_zoom', zoom.toString());
  }, [zoom]);

  React.useEffect(() => {
    // 1. Chặn click chuột phải mặc định (Context Menu)
    const handleContextMenu = (e) => {
      e.preventDefault();
    };

    // 2. Phím tắt phóng to/thu nhỏ (Ctrl +, Ctrl -, Ctrl 0) và chặn reload (F5, Ctrl+R)
    const handleKeyDown = (e) => {
      if (e.ctrlKey) {
        if (e.key === '=' || e.key === '+') {
          e.preventDefault();
          setZoom(prev => Math.min(2.0, prev + 0.05));
        } else if (e.key === '-') {
          e.preventDefault();
          setZoom(prev => Math.max(0.5, prev - 0.05));
        } else if (e.key === '0') {
          e.preventDefault();
          setZoom(1.0);
        } else if (e.key.toLowerCase() === 'r') {
          e.preventDefault();
        }
      } else if (e.key === 'F5') {
        e.preventDefault();
      }
    };

    // 3. Cuộn chuột thu phóng khi giữ Ctrl (Ctrl + Wheel)
    const handleWheel = (e) => {
      if (e.ctrlKey) {
        e.preventDefault();
        if (e.deltaY < 0) {
          setZoom(prev => Math.min(2.0, prev + 0.05));
        } else {
          setZoom(prev => Math.max(0.5, prev - 0.05));
        }
      }
    };

    window.addEventListener('contextmenu', handleContextMenu);
    window.addEventListener('keydown', handleKeyDown);
    window.addEventListener('wheel', handleWheel, { passive: false });

    return () => {
      window.removeEventListener('contextmenu', handleContextMenu);
      window.removeEventListener('keydown', handleKeyDown);
      window.removeEventListener('wheel', handleWheel);
    };
  }, []);

  const [currentUser, setCurrentUser] = React.useState(null);
  const [userData, setUserData] = React.useState(null);
  const [authLoading, setAuthLoading] = React.useState(true);

  const [activeTab, setActiveTab] = React.useState('home');
  const [activeMenuLeft, setActiveMenuLeft] = React.useState('mienphi');
  const [selectedGame, setSelectedGame] = React.useState(null);

  // Lắng nghe thay đổi trạng thái đăng nhập từ Firebase
  React.useEffect(() => {
    const unsubscribe = auth.onAuthStateChanged(async (user) => {
      if (user) {
        setCurrentUser(user);
        
        // Kích hoạt lắng nghe dữ liệu thời gian thực từ Firestore
        const userRef = db.collection("users").doc(user.uid);
        const unsubscribeSnapshot = userRef.onSnapshot(async (doc) => {
          if (doc.exists) {
            setUserData(doc.data());
          } else {
            // Đề phòng trường hợp chưa có Profile
            const fallbackProfile = {
              uid: user.uid,
              displayName: user.displayName || "Thành viên",
              email: user.email,
              greenCoins: 0,
              goldTickets: 0,
              role: "THÀNH VIÊN",
              avatar: `https://ui-avatars.com/api/?name=${encodeURIComponent(user.displayName || "User")}&background=00d8e6&color=000&rounded=true&font-size=0.6`
            };
            await userRef.set(fallbackProfile);
            setUserData(fallbackProfile);
          }
          setAuthLoading(false);
        }, err => {
          console.error("Lỗi Firestore: ", err);
          setAuthLoading(false);
        });

        return () => unsubscribeSnapshot();
      } else {
        setCurrentUser(null);
        setUserData(null);
        setAuthLoading(false);
      }
    });

    return () => unsubscribe();
  }, []);

  if (gate === 'checking' || authLoading) {
    return (
      <div className="gate-screen">
        <div className="gate-spinner"></div>
        <div className="gate-text">ĐANG TẢI DỮ LIỆU...</div>
      </div>
    );
  }
  if (gate === 'locked') {
    return (
      <div className="gate-screen gate-locked">
        <div className="gate-lock-icon"><i className="ph-fill ph-lock-key"></i></div>
        <div className="gate-title">KHÔNG THỂ KẾT NỐI</div>
        <div className="gate-desc">Vui lòng chạy <b>5.py</b> trên máy để sử dụng web.</div>
        <button className="gate-retry-btn" onClick={retryGate}><i className="ph-bold ph-arrow-clockwise"></i> THỬ LẠI</button>
      </div>
    );
  }

  // BẢO VỆ TOÀN DIỆN: Nếu chưa đăng nhập, bắt buộc hiển thị màn hình đăng nhập tràn viền
  if (!currentUser) {
    return <AuthPage />;
  }

  return (
    <React.Fragment>
      {activeTab === 'game' && !selectedGame && <Sidebar activeMenuLeft={activeMenuLeft} setActiveMenuLeft={setActiveMenuLeft} />}
      <div className="main-area">
        <TopBar 
          activeTab={activeTab} 
          setActiveTab={setActiveTab} 
          zoom={zoom} 
          setZoom={setZoom} 
          currentUser={currentUser}
          userData={userData}
        />
        {activeTab === 'home' ? (
          <HomeContent />
        ) : activeTab === 'profile' ? (
          <UserProfileContent currentUser={currentUser} userData={userData} />
        ) : (
          (activeMenuLeft === 'mienphi' || activeMenuLeft === 'steam') 
            ? <MainContent selectedGame={selectedGame} setSelectedGame={setSelectedGame} /> 
            : <NotSupportedContent platform={activeMenuLeft} />
        )}
      </div>
    </React.Fragment>
  );
};

const rootNode = document.getElementById('root');
const root = ReactDOM.createRoot(rootNode);
root.render(<App />);
    </script>
</body>
